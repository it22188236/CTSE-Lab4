spring.application.name=api-gateway
server.port=8080

# Use reactive web app type for Spring Cloud Gateway
spring.main.web-application-type=reactive

# Eureka Configuration
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.instance.hostname=localhost
eureka.instance.instanceId=${spring.application.name}:${server.port}

# Actuator endpoints for health check
management.endpoints.web.exposure.include=health,info

# Downstream service URLs (overridable via environment variables)
item.service.url=${ITEM_SERVICE_URL:http://localhost:8081}
order.service.url=${ORDER_SERVICE_URL:http://localhost:8082}
payment.service.url=${PAYMENT_SERVICE_URL:http://localhost:8083}
